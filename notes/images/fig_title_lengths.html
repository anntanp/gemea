<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DDB Title Token Lengths</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0f0804; display: flex; justify-content: center; padding: 32px 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Inline data from title-length-analysis.json -->
  <script>
    window.TITLE_DATA = {"total_titles":4477780,"year_source":{"dates_column":4002222,"title_fallback":46461,"no_year":429097},"year_range":[1400,2029],"bucket_size":25,"length_thresholds":{"short_max":4,"medium_max":14},"overall":{"short":1269034,"medium":2110610,"long":1098136,"median_all_tokens":8,"median_content_tokens":5},"bucketed":{"1500\u20131524":{"short":1824,"medium":4854,"long":5531,"total":12209,"median_all_tokens":13,"median_content_tokens":7},"1525\u20131549":{"short":3233,"medium":10034,"long":10634,"total":23901,"median_all_tokens":13,"median_content_tokens":7},"1550\u20131574":{"short":5163,"medium":14251,"long":14388,"total":33802,"median_all_tokens":12,"median_content_tokens":6},"1575\u20131599":{"short":5443,"medium":15921,"long":15943,"total":37307,"median_all_tokens":12,"median_content_tokens":6},"1600\u20131624":{"short":8514,"medium":21223,"long":28150,"total":57887,"median_all_tokens":14,"median_content_tokens":7},"1625\u20131649":{"short":6478,"medium":11794,"long":18523,"total":36795,"median_all_tokens":15,"median_content_tokens":8},"1650\u20131674":{"short":9230,"medium":19485,"long":27602,"total":56317,"median_all_tokens":14,"median_content_tokens":7},"1675\u20131699":{"short":10298,"medium":22560,"long":32865,"total":65723,"median_all_tokens":15,"median_content_tokens":7},"1700\u20131724":{"short":19155,"medium":42472,"long":50960,"total":112587,"median_all_tokens":13,"median_content_tokens":6},"1725\u20131749":{"short":23232,"medium":49450,"long":53120,"total":125802,"median_all_tokens":12,"median_content_tokens":6},"1750\u20131774":{"short":40415,"medium":81176,"long":61460,"total":183051,"median_all_tokens":10,"median_content_tokens":5},"1775\u20131799":{"short":144136,"medium":162820,"long":99060,"total":406016,"median_all_tokens":7,"median_content_tokens":4},"1800\u20131824":{"short":49965,"medium":81966,"long":63655,"total":195586,"median_all_tokens":9,"median_content_tokens":5},"1825\u20131849":{"short":72563,"medium":162407,"long":83959,"total":318929,"median_all_tokens":7,"median_content_tokens":5},"1850\u20131874":{"short":88852,"medium":178563,"long":97249,"total":364664,"median_all_tokens":9,"median_content_tokens":5},"1875\u20131899":{"short":179839,"medium":232233,"long":91742,"total":503814,"median_all_tokens":6,"median_content_tokens":4},"1900\u20131924":{"short":239540,"medium":308312,"long":76453,"total":624305,"median_all_tokens":6,"median_content_tokens":4},"1925\u20131949":{"short":96259,"medium":121474,"long":49952,"total":267685,"median_all_tokens":7,"median_content_tokens":4},"1950\u20131974":{"short":39353,"medium":46464,"long":22033,"total":107850,"median_all_tokens":7,"median_content_tokens":4},"1975\u20131999":{"short":33380,"medium":54271,"long":18806,"total":106457,"median_all_tokens":8,"median_content_tokens":5},"2000\u20132024":{"short":35531,"medium":249255,"long":115783,"total":400569,"median_all_tokens":11,"median_content_tokens":6},"2025\u20132049":{"short":7,"medium":7,"long":5,"total":19,"median_all_tokens":8,"median_content_tokens":5}}};
  </script>

  <script type="text/babel">
    const { useRef, useState } = React;
    const rawData = window.TITLE_DATA;

    const BOOK_W     = 44;
    const BOOK_GAP   = 5;
    const MAX_BOOK_H = 300;
    const MIN_BOOK_H = 28;
    const SHELF_Y    = 415;
    const START_X    = 60;
    const SVG_H      = 510;

    function patina(median) {
      const t = Math.min(1, Math.max(0, (median - 6) / 9));
      const h = (27 - t * 12).toFixed(1);
      const s = (45 + t * 23).toFixed(1);
      const l = (54 - t * 34).toFixed(1);
      return `hsl(${h},${s}%,${l}%)`;
    }

    function patinaHighlight(median) {
      const t = Math.min(1, Math.max(0, (median - 6) / 9));
      const h = (27 - t * 12).toFixed(1);
      const s = (30 + t * 15).toFixed(1);
      const l = (68 - t * 28).toFixed(1);
      return `hsl(${h},${s}%,${l}%)`;
    }

    function fmt(n) {
      if (n >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (n >= 1_000)     return `${(n / 1_000).toFixed(1)}k`;
      return String(n);
    }

    function TitleLengthLibrary() {
      const containerRef = useRef(null);
      const [tooltip, setTooltip] = useState(null);

      const buckets = Object.entries(rawData.bucketed)
        .filter(([, v]) => v.total > 100)
        .map(([label, v]) => ({ label, ...v }));

      const maxTotal = Math.max(...buckets.map(b => b.total));
      const SVG_W = START_X * 2 + buckets.length * (BOOK_W + BOOK_GAP) - BOOK_GAP;

      const bookH = (total) => Math.max(MIN_BOOK_H, (total / maxTotal) * MAX_BOOK_H);

      function handleMouseMove(e, book) {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        setTooltip({ book, x: e.clientX - rect.left + 14, y: e.clientY - rect.top - 10 });
      }

      return (
        <div ref={containerRef} style={{ position: 'relative', display: 'inline-block', background: '#0f0804' }}>
          <svg width={SVG_W} height={SVG_H} viewBox={`0 0 ${SVG_W} ${SVG_H}`}
               style={{ display: 'block' }}>
            <defs>
              <pattern id="grain" width="4" height="60" patternUnits="userSpaceOnUse">
                <line x1="1"   y1="0" x2="0.5" y2="60" stroke="rgba(0,0,0,0.09)"      strokeWidth="0.6"/>
                <line x1="3.2" y1="0" x2="2.8" y2="60" stroke="rgba(255,255,255,0.04)" strokeWidth="0.4"/>
              </pattern>
              <linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stopColor="#7a4e22"/>
                <stop offset="18%"  stopColor="#5c3510"/>
                <stop offset="100%" stopColor="#2a1508"/>
              </linearGradient>
              <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stopColor="#1c0d06"/>
                <stop offset="100%" stopColor="#0f0804"/>
              </linearGradient>
            </defs>

            <rect width={SVG_W} height={SVG_H} fill="url(#wall)"/>
            {Array.from({ length: 7 }, (_, i) => (
              <line key={i} x1="0" y1={i * 65 + 65} x2={SVG_W} y2={i * 65 + 65}
                    stroke="rgba(255,255,255,0.012)" strokeWidth="1"/>
            ))}

            {buckets.map((b, i) => {
              const bh   = bookH(b.total);
              const bx   = START_X + i * (BOOK_W + BOOK_GAP);
              const by   = SHELF_Y - bh;
              const base = patina(b.median_all_tokens);
              const hl   = patinaHighlight(b.median_all_tokens);
              return (
                <g key={b.label}
                   onMouseMove={(e) => handleMouseMove(e, b)}
                   onMouseLeave={() => setTooltip(null)}
                   style={{ cursor: 'crosshair' }}>
                  <rect x={bx+3} y={by+3} width={BOOK_W} height={bh}
                        fill="rgba(0,0,0,0.5)" rx="2"/>
                  <rect x={bx} y={by} width={BOOK_W} height={bh}
                        fill={base} rx="2" ry="2"/>
                  <rect x={bx} y={by} width={BOOK_W} height={bh}
                        fill="url(#grain)" rx="2" opacity="0.75"/>
                  <rect x={bx} y={by} width={5} height={bh}
                        fill={hl} rx="2" opacity="0.55"/>
                  <rect x={bx+BOOK_W-4} y={by} width={4} height={bh}
                        fill="rgba(0,0,0,0.35)" rx="2"/>
                  <rect x={bx} y={by} width={BOOK_W} height={4}
                        fill={hl} rx="2" opacity="0.65"/>
                  <rect x={bx+1} y={by+bh-6} width={BOOK_W-2} height={6}
                        fill="rgba(0,0,0,0.25)" rx="1"/>
                  {bh > 50 && (
                    <text
                      x={bx + BOOK_W / 2} y={by + bh / 2}
                      transform={`rotate(-90,${bx + BOOK_W / 2},${by + bh / 2})`}
                      fill="rgba(255,215,110,0.62)" fontSize="8.5"
                      fontFamily="Georgia,'Times New Roman',serif"
                      textAnchor="middle" letterSpacing="0.9">
                      {b.label}
                    </text>
                  )}
                  {bh <= 50 && (
                    <text
                      x={bx + BOOK_W / 2} y={SHELF_Y + 36}
                      transform={`rotate(-55,${bx + BOOK_W / 2},${SHELF_Y + 36})`}
                      fill="rgba(200,155,70,0.5)" fontSize="7.5"
                      fontFamily="Georgia,serif" textAnchor="end" letterSpacing="0.3">
                      {b.label}
                    </text>
                  )}
                </g>
              );
            })}

            <rect x={18} y={SHELF_Y}    width={SVG_W-36} height={22} fill="url(#shelf)" rx="2"/>
            <rect x={18} y={SHELF_Y}    width={SVG_W-36} height={2}  fill="rgba(255,185,70,0.22)" rx="1"/>
            <rect x={18} y={SHELF_Y+22} width={SVG_W-36} height={9}  fill="rgba(0,0,0,0.65)" rx="2"/>

            <text x={SVG_W/2} y={36} fill="rgba(235,205,140,0.75)" fontSize="14"
                  fontFamily="Georgia,'Times New Roman',serif"
                  textAnchor="middle" letterSpacing="3">
              DDB TITLE TOKEN LENGTHS · 1500 – 2024
            </text>
            <text x={SVG_W/2} y={54} fill="rgba(175,140,85,0.45)" fontSize="9"
                  fontFamily="Georgia,serif" textAnchor="middle" letterSpacing="1.5">
              Height · objects per 25-year period  ·  Patina · median title length in tokens
            </text>

            <text x={SVG_W-192} y={SVG_H-80} fill="rgba(185,148,82,0.6)" fontSize="7.5"
                  fontFamily="Georgia,serif" letterSpacing="1.2">
              PATINA · MEDIAN TOKENS
            </text>
            {[6, 8, 10, 12, 14].map((t, i) => (
              <g key={t}>
                <rect x={SVG_W-192+i*29} y={SVG_H-70} width={23} height={15}
                      fill={patina(t)} rx="1"/>
                <text x={SVG_W-192+i*29+11.5} y={SVG_H-50}
                      fill="rgba(185,148,82,0.55)" fontSize="8"
                      fontFamily="Georgia,serif" textAnchor="middle">
                  {t}
                </text>
              </g>
            ))}
            <text x={SVG_W-192} y={SVG_H-40} fill="rgba(160,125,65,0.4)" fontSize="7.5"
                  fontFamily="Georgia,serif">modern</text>
            <text x={SVG_W-192+4*29+12} y={SVG_H-40} fill="rgba(160,125,65,0.4)" fontSize="7.5"
                  fontFamily="Georgia,serif" textAnchor="end">baroque</text>
          </svg>

          {tooltip && (
            <div style={{
              position: 'absolute', left: tooltip.x, top: tooltip.y,
              background: 'rgba(10,6,2,0.97)',
              border: '1px solid rgba(210,165,70,0.32)',
              borderRadius: '3px', padding: '9px 13px',
              color: '#e0c880',
              fontFamily: "Georgia,'Times New Roman',serif",
              fontSize: '11px', lineHeight: '1.75',
              pointerEvents: 'none', whiteSpace: 'nowrap',
              zIndex: 20, boxShadow: '0 3px 16px rgba(0,0,0,0.75)',
            }}>
              <div style={{ fontWeight: 'bold', marginBottom: 3, letterSpacing: '0.5px' }}>
                {tooltip.book.label}
              </div>
              <div>{fmt(tooltip.book.total)} objects</div>
              <div style={{ marginTop: 5, color: 'rgba(200,160,85,0.75)', fontSize: '10px' }}>
                Short  (≤ 4 tok): {fmt(tooltip.book.short)} ({((tooltip.book.short  / tooltip.book.total) * 100).toFixed(0)}%)
              </div>
              <div style={{ color: 'rgba(200,160,85,0.75)', fontSize: '10px' }}>
                Medium (5–14):    {fmt(tooltip.book.medium)} ({((tooltip.book.medium / tooltip.book.total) * 100).toFixed(0)}%)
              </div>
              <div style={{ color: 'rgba(200,160,85,0.75)', fontSize: '10px' }}>
                Long   (≥ 15 tok): {fmt(tooltip.book.long)} ({((tooltip.book.long   / tooltip.book.total) * 100).toFixed(0)}%)
              </div>
              <div style={{ marginTop: 5, color: 'rgba(185,148,75,0.6)', fontSize: '10px' }}>
                Median tokens: {tooltip.book.median_all_tokens}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TitleLengthLibrary />);
  </script>
</body>
</html>
